<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>客服与售后｜北极星</title><link rel="stylesheet" href="./legal.css?v=2">
</head>
<body><main class="legal-shell"><nav class="legal-nav"><a href="./">← 返回北极星</a><a href="./refund.html">退款规则</a></nav>
<article class="legal-card">
  <h1>客服与售后</h1>
  <div class="support-info" style="margin-bottom: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; background: rgba(255,255,255,0.02);">
    <p style="margin: 0 0 8px 0; font-weight: bold;">客服渠道：</p>
    <p style="margin: 0 0 6px 0;">联系邮箱：<a href="mailto:tasyfan264@gmail.com">tasyfan264@gmail.com</a></p>
    <p style="margin: 0; color: rgba(255,255,255,0.6); font-size: 13px;">也可以通过下面的表单提交工单，我们通常 24 小时内回复。</p>
  </div>
  <p>请留下可联系到你的邮箱、微信号或其他方式。不要填写密码、验证码或完整银行卡信息。</p>
  <form id="support-form" class="support-form">
    <label>问题类型<select name="category"><option value="payment">支付与订单</option><option value="refund">退款申请</option><option value="report">报告故障</option><option value="privacy">隐私与数据</option><option value="other">其他</option></select></label>
    <label>联系方式<input name="contact" maxlength="160" required placeholder="邮箱、微信号或其他可联系方式"></label>
    <label>订单号（如有）<input name="orderId" maxlength="120" placeholder="例如支付完成页显示的订单号"></label>
    <label>问题说明<textarea name="message" maxlength="3000" required placeholder="请说明发生时间、页面和具体问题"></textarea></label>
    <button type="submit">提交客服工单</button>
    <p id="support-result" role="status"></p>
  </form>
</article></main>
<script>
document.getElementById('support-form').addEventListener('submit', async function (event) {
  event.preventDefault();
  const form = event.currentTarget;
  const button = form.querySelector('button');
  const result = document.getElementById('support-result');
  button.disabled = true;
  result.textContent = '正在提交...';
  try {
    const payload = Object.fromEntries(new FormData(form).entries());
    payload.locale = window.NorthstarI18n ? window.NorthstarI18n.getLocale() : 'zh-CN';
    const response = await fetch('/api/support', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || '提交失败');
    result.textContent = data.message + ' 工单编号：' + data.id;
    fetch('/api/analytics/event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        eventName: 'support_submitted',
        orderId: payload.orderId || '',
        locale: payload.locale,
        metadata: { category: payload.category || 'other' }
      }),
      keepalive: true
    }).catch(function () {});
    form.reset();
  } catch (error) {
    result.textContent = error.message || '提交失败，请稍后重试。';
  } finally {
    button.disabled = false;
  }
});
</script><script src="./locales/en.js?v=2"></script><script src="./i18n.js?v=2"></script></body></html>
