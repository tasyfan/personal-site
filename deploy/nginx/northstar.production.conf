server {
    server_name northstar.fantasy-games.org;

    root /var/www/northstar;
    index index.html;

    include /etc/nginx/snippets/northstar-security-headers.conf;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:html|js)$ {
        try_files $uri =404;
        include /etc/nginx/snippets/northstar-security-headers.conf;
        add_header Cache-Control "no-store, max-age=0" always;
    }

    location /api/ {
        proxy_pass http://localhost:3001/api/;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin.html {
        proxy_pass http://localhost:3001/admin.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/northstar.fantasy-games.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/northstar.fantasy-games.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = northstar.fantasy-games.org) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name northstar.fantasy-games.org;
    return 404;
}
